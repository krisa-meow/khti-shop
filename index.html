<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Гостиница для животных «Милая Пума»</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css?v0.00005">

    <script src="./js/script.js" defer></script>
</head>
<body>
    <!-- Шапка сайта -->
    <header class="header">
        <div class="header__container container">

            <!-- Логотип + бренд -->
            <a href="#" class="header__logo">
                <img src="./images/logo.png" alt="header__logo" class="logo__img" style="height: 50px;">
                <div class="logo__title">
                    <span>«МИЛАЯ ПУМА»</span>
                    <span>ГОСТИНИЦА ДЛЯ ЖИВОТНЫХ</span>
                </div>
            </a>

            <!-- Навигация сайта -->
            <div class="header__nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="#" class="nav__link" data-text="О НАС">О НАС</a></li>
                    <li class="nav__item"><a href="#" class="nav__link" data-text="УСЛУГИ">УСЛУГИ</a></li>
                    <li class="nav__item"><a href="#" class="nav__link" data-text="КАЛЕНДАРЬ БРОНИРОВАНИЯ">КАЛЕНДАРЬ БРОНИРОВАНИЯ</a></li>
                    <li class="nav__item"><a href="#" class="nav__link" data-text="ПРАВИЛА ЗАСЕЛЕНИЯ">ПРАВИЛА ЗАСЕЛЕНИЯ</a></li>
                    <li class="nav__item"><a href="#" class="nav__link" data-text="КОНТАКТЫ">КОНТАКТЫ</a></li>
                </ul>
            </div>

            <!-- Контактная информация -->
            <div class="header__interaction">
                <div class="social__list">
                    <a href="#" class="social__link"><img src="./images/icon=vk, color=yes, round=yes.svg" alt="vk"></a>
                    <a href="#" class="social__link"><img src="./images/icon=telegramm, color=yes, round=yes.svg" alt=""></a>
                    <a href="#" class="social__link"><img src="images/icon=watsapp, color=yes, round=yes.svg" alt="wa"></a>
                </div>
                <div class="contact__list">
                    <span class="contact__item">+7 (965) 506-66-25</span>
                    <span class="contact__item">УЛ. АТМОСФЕРНАЯ, 5, ЕКАТЕРИНБУРГ</span>   
                </div>
            </div>

        </div>
    </header>

</body>
</html>
